# Codex CLI configuration
# See: https://github.com/openai/codex

approval_policy = "on-request"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = true

[[hooks.PreToolUse]]
matcher = "^Bash$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "bash ~/dotfiles/genai/hooks/pre-commit-fmt.sh"
timeout = 10

[[hooks.PostToolUse]]
matcher = "^(apply_patch|Edit|Write)$"

[[hooks.PostToolUse.hooks]]
type = "command"
command = "bash ~/dotfiles/genai/hooks/post-edit-fmt.sh"
timeout = 10

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = "bash ~/dotfiles/genai/hooks/stop-notify.sh"
timeout = 10

[tui]
status_line = [
  "model-with-reasoning",
  "current-dir",
  "git-branch",
  "approval-mode",
  "context-remaining",
  "five-hour-limit",
  "weekly-limit",
]
